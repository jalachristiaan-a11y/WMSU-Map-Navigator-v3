<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSU Navigator | Admin Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --crimson: #9d0610;
            --crimson-hover: #7a040b;
            --accent-gold: #ffcc00;
            --dark-bg: #0b0c10;
            --input-bg: #1a1c22;
            --text-gray: #9499a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body, html { height: 100%; margin: 0; background-color: var(--dark-bg); color: white; }

        .split-screen { display: flex; height: 100vh; width: 100%; overflow: hidden; }

        /* Left Side: Branding and Visuals */
        .left-side { 
            flex: 1.1; 
            position: relative; 
            display: flex; 
            align-items: flex-end; 
            padding: 80px; 
            min-width: 50%;
        }

        .bg-img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
        }

        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(to top, rgba(11, 12, 16, 1) 15%, transparent 100%); 
            z-index: 2; 
        }

        .logo { position: absolute; top: 40px; left: 60px; font-family: 'Montserrat', sans-serif; font-weight: 800; z-index: 3; }
        .logo span { color: var(--crimson); }

        .content-left { position: relative; z-index: 3; }
        .hero-text h1 { font-family: 'Montserrat', sans-serif; font-size: 3.2rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-text h1 span { color: var(--accent-gold); }
        .hero-text p { color: rgba(255,255,255,0.7); max-width: 480px; line-height: 1.6; }

        /* Right Side: Sign Up Form */
        .right-side { flex: 0.9; display: flex; align-items: center; justify-content: center; padding: 40px; background-color: var(--dark-bg); }
        .form-wrapper { width: 100%; max-width: 420px; }

        .admin-badge { 
            background: rgba(255, 204, 0, 0.1); 
            color: var(--accent-gold); 
            padding: 5px 12px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .form-header h2 { font-family: 'Montserrat', sans-serif; font-size: 2.4rem; margin: 15px 0 10px; }
        .form-header h2 span { color: var(--crimson); }
        .form-header p { color: var(--text-gray); margin-bottom: 35px; font-size: 0.95rem; }

        /* Form Controls */
        .input-box { margin-bottom: 18px; }
        .input-box label { color: #eee; display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }

        .input-field { position: relative; }
        .input-field i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 0.9rem; }
        .input-field input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 14px 14px 45px;
            border-radius: 8px;
            color: white;
            transition: 0.3s;
        }
        .input-field input:focus { border-color: var(--crimson); outline: none; background: #23272f; }

        .options-row { margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .options-row label { color: var(--text-gray); font-size: 0.85rem; cursor: pointer; }
        .options-row input { accent-color: var(--crimson); }

        /* Sign Up Button */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--crimson);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(157, 6, 16, 0.4);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary:hover { background: var(--crimson-hover); transform: translateY(-2px); }

        .form-footer { text-align: center; margin-top: 25px; }
        .form-footer p { color: var(--text-gray); font-size: 0.85rem; margin-bottom: 15px; }
        .form-footer a { color: var(--accent-gold); text-decoration: none; font-weight: 600; }
        .form-footer a:hover { text-decoration: underline; }

        .back-home { display: block; font-size: 0.8rem; color: var(--text-gray); text-decoration: none; margin-top: 20px; transition: 0.3s; opacity: 0.6; }
        .back-home:hover { opacity: 1; transform: translateX(-5px); }

        /* Responsive */
        @media (max-width: 768px) {
            .left-side { display: none; }
            .right-side { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="split-screen">
        <div class="left-side">
            <img src="../assets/images/cte.png" alt="WMSU Campus" class="bg-img">
            <div class="overlay"></div>
            <div class="content-left">
                <div class="logo">WMSU <span>NAVIGATOR</span></div>
                <div class="hero-text">
                    <h1>Join the <br><span>Admin Team.</span></h1>
                    <p>Help maintain the digital frontier of the Crimson campus. Secure, manage, and empower the WMSU community.</p>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="form-wrapper">
                <div class="form-header">
                    <span class="admin-badge">Management Registration</span>
                    <h2>Register<span>.</span></h2>
                    <p>Create your administrative account</p>
                </div>
                
                <form action="admin-login-page.html" method="post" onsubmit="alert('A verification code will be sent to your email shortly.')">
                    <div class="input-box">
                        <label>Full Name</label>
                        <div class="input-field">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" placeholder="e.g. John Doe" name="username" required>
                        </div>
                    </div>

                    <div class="input-box">
                        <label>Institutional Email</label>
                        <div class="input-field">
                            <i class="fas fa-envelope"></i>
                            <input type="email" placeholder="admin.name@wmsu.edu.ph" name="email" required>
                        </div>
                    </div>

                    <div class="input-box">
                        <label>Password</label>
                        <div class="input-field">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="••••••••" name="password" required>
                        </div>
                    </div>

                    <div class="options-row">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Agree to security protocols</label>
                    </div>

                    <button type="submit" class="btn-primary">Create Admin Account</button>
                    
                    <div class="form-footer">
                        <p>Already have an account? <a href="admin-login-page.html">Log In</a></p>
                        <a href="../index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
